<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="发票识别工作台：在 Mac 本机批量识别中文发票，集中复核后导出 Excel。">
  <title>发票识别工作台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="shell">
      <a class="brand" href="./">发票识别工作台</a>
      <div class="links"><a href="support/">支持</a><a href="privacy/">隐私政策</a></div>
    </nav>
  </header>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">macOS 13 或更高版本</div>
      <h1>把一批发票，整理成一张可复核的 Excel 明细表。</h1>
      <p class="lead">导入 JPG、PNG 或 PDF，在 Mac 本机完成 OCR，集中检查金额、税额、号码和开票内容，再导出 Excel。</p>
      <div class="feature-grid">
        <div class="feature"><strong>批量导入</strong><span>一次整理多张图片或 PDF 发票。</span></div>
        <div class="feature"><strong>集中复核</strong><span>标出缺失字段，支持逐项修改。</span></div>
        <div class="feature"><strong>本机处理</strong><span>无需账号，不依赖第三方云端 OCR。</span></div>
      </div>
      <div class="notice">OCR 会受到图片清晰度、拍摄角度和发票版式影响。导出或入账前，请人工复核关键字段。</div>
    </section>
  </main>
  <footer><div class="shell"><span>© 2026 发票识别工作台</span><span><a href="support/">支持</a> · <a href="privacy/">隐私政策</a></span></div></footer>
</body>
</html>
